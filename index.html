<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>JULIAN</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Outfit',sans-serif;width:100vw;height:100vh}
canvas{position:fixed;top:0;left:0;width:100%;height:100%}
.wm-wrap{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:4px;user-select:none}
.wm-topic{font-size:clamp(18px,3.5vw,36px);font-weight:300;color:rgba(255,109,0,0.5);letter-spacing:0.45em;text-transform:uppercase}
.wm-name{font-size:clamp(80px,20vw,300px);font-weight:800;color:#FF6D00;text-shadow:0 0 80px rgba(255,109,0,0.9),0 0 160px rgba(255,109,0,0.6),0 0 250px rgba(255,109,0,0.2);letter-spacing:0.06em;white-space:nowrap;line-height:0.85}
.stamp{position:fixed;bottom:20px;right:20px;z-index:3;pointer-events:none;user-select:none}
.stamp-pill{display:flex;align-items:center;gap:8px;padding:8px 18px 8px 16px;border-radius:100px;background:rgba(255,109,0,0.12);border:1px solid rgba(255,109,0,0.5);box-shadow:0 0 30px rgba(255,109,0,0.25),0 0 60px rgba(255,109,0,0.1);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.stamp-dot{width:8px;height:8px;border-radius:50%;background:#FF6D00;box-shadow:0 0 12px rgba(255,109,0,0.9)}
.stamp-txt{font-size:clamp(10px,1.5vw,14px);font-weight:600;color:rgba(255,109,0,0.9);letter-spacing:0.12em;white-space:nowrap}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="wm-wrap">
  <div class="wm-topic">LOOPS</div>
  <div class="wm-name">JULIAN</div>
</div>
<div class="stamp">
  <div class="stamp-pill">
    <div class="stamp-dot"></div>
    <div class="stamp-txt">YOU DO THIS TOO</div>
  </div>
</div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
const RM=window.matchMedia('(prefers-reduced-motion:reduce)').matches;
const CR=255,CG=109,CB=0; // Electric Orange (Behavior)
const ER=255,EG=0,EB=60; // Crimson Red (Warning/Anxiety)
let W,H,cx,cy;
const N=180;
let pts=[];
let t0=0,lastPhase='';
let executeFlash = 0;
let warningAlpha = 0;

function sz(){
  const d=devicePixelRatio||1;W=innerWidth;H=innerHeight;
  c.width=W*d;c.height=H*d;c.style.width=W+'px';c.style.height=H+'px';
  ctx.setTransform(d,0,0,d,0,0);cx=W/2;cy=H/2;
  init();
}

function init(){
  pts=[];
  for(let i=0;i<N;i++){
    pts.push({
      x:cx+(Math.random()-0.5)*W,
      y:cy+(Math.random()-0.5)*H,
      vx:(Math.random()-0.5)*0.8,
      vy:(Math.random()-0.5)*0.8,
      angle:0, 
      locked:false,
      sz:2+Math.random()*3.5,bright:0.6+Math.random()*0.4,
      trail:[]
    });
  }
  t0=performance.now();lastPhase='';
  executeFlash = 0;
  warningAlpha = 0;
}

// 5s drift, 5s execute, 5s release
const CY=15;
const PH=[
  ['drift1',0,5],
  ['execute',5,10],
  ['drift2',10,15]
];

function getPhase(t){
  const ct=t%CY;
  for(const[n,s,e]of PH)if(ct>=s&&ct<e)return{name:n,p:(ct-s)/(e-s)};
  return{name:'drift1',p:1};
}

function applyPhase(name){
  if(name===lastPhase)return;lastPhase=name;
  if(name==='execute'){
    executeFlash = 1.0; // Trigger bright flash
    warningAlpha = 1.0; // Warning drops in instantly
    for(let i=0;i<N;i++){
      pts[i].locked = true;
      pts[i].angle = (i/N) * Math.PI * 2;
    }
  } else if(name==='drift2'){
    warningAlpha = 0; // Warning vanishes instantly
    for(let i=0;i<N;i++){
      const p=pts[i];
      if(p.locked){
        const dx=p.x-cx,dy=p.y-cy,d=Math.max(1,Math.sqrt(dx*dx+dy*dy));
        p.vx=(dx/d)*7+(Math.random()-0.5)*3;
        p.vy=(dy/d)*7+(Math.random()-0.5)*3;
        p.locked=false;
      }
    }
  }
}

function drawWarningSign(alpha, t){
    const scale = Math.min(W,H) * 0.006;
    ctx.save();
    ctx.translate(cx, cy);
    
    // Pulsate the size slightly
    const pulse = 1 + Math.sin(t*20)*0.05;
    ctx.scale(scale * pulse, scale * pulse);
    
    // Intense Red Glow
    const g=ctx.createRadialGradient(0,0,0,0,0,100);
    g.addColorStop(0,'rgba('+ER+','+EG+','+EB+','+(alpha*0.5)+')');
    g.addColorStop(1,'rgba('+ER+','+EG+','+EB+',0)');
    ctx.fillStyle=g;ctx.fillRect(-100,-100,200,200);
    
    // Draw Triangle Outline (Thick)
    ctx.strokeStyle='rgba('+ER+','+EG+','+EB+','+alpha+')';
    ctx.lineWidth=6;
    ctx.lineJoin='round';
    ctx.beginPath();
    ctx.moveTo(-40, 35);
    ctx.lineTo(40, 35);
    ctx.lineTo(0, -50);
    ctx.closePath();
    ctx.stroke();
    
    // Draw Exclamation Mark Line
    ctx.strokeStyle='rgba('+ER+','+EG+','+EB+','+alpha+')';
    ctx.lineWidth=10;
    ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(0, -25);
    ctx.lineTo(0, 10);
    ctx.stroke();
    
    // Draw Exclamation Mark Dot
    ctx.beginPath();
    ctx.arc(0, 25, 6, 0, Math.PI*2);
    ctx.fillStyle='rgba('+ER+','+EG+','+EB+','+alpha+')';
    ctx.fill();
    
    ctx.restore();
}

function frame(now){
  const el=(now-t0)/1000;
  const{name,p}=getPhase(el);
  applyPhase(name);

  if(!RM){
    const loopR=Math.min(W,H)*0.14; // Tight cage radius around the warning
    
    if(name==='drift1'){
      for(let i=0;i<N;i++){
        const pt=pts[i];
        pt.vx+=(Math.random()-0.5)*0.2;
        pt.vy+=(Math.random()-0.5)*0.2;
        pt.vx*=0.95;pt.vy*=0.95;
        pt.x+=pt.vx;pt.y+=pt.vy;
      }
    }
    else if(name==='execute'){
      const speed=0.14; // Frantic, high-speed numbing spin
      
      for(let i=0;i<N;i++){
        const pt=pts[i];
        if(pt.locked){
          pt.angle+=speed;
          // Add a slight wobble to make it look like a grinding jaw/blur
          const wobble = Math.sin(el*40 + i) * 5;
          pt.x=cx+Math.cos(pt.angle)*(loopR+wobble);
          pt.y=cy+Math.sin(pt.angle)*(loopR+wobble);
        }
      }
    }
    else if(name==='drift2'){
      for(let i=0;i<N;i++){
        const pt=pts[i];
        pt.vx+=(Math.random()-0.5)*0.2;
        pt.vy+=(Math.random()-0.5)*0.2;
        pt.vx*=0.95;pt.vy*=0.95;
        pt.x+=pt.vx;pt.y+=pt.vy;
      }
    }

    for(let i=0;i<N;i++){
      const pt=pts[i];
      pt.trail.push({x:pt.x,y:pt.y});
      const maxT=pt.locked?20:6; // Very long blurry trails to show speed
      while(pt.trail.length>maxT)pt.trail.shift();
    }
    
    executeFlash *= 0.85; // Fade out the flash
  }

  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);

  // Draw Warning Sign First (so particles overlap it)
  if(warningAlpha > 0.01){
    drawWarningSign(warningAlpha, el);
  }

  // Draw trails
  for(let i=0;i<N;i++){
    const pt=pts[i];
    if(pt.trail.length<2)continue;
    for(let j=1;j<pt.trail.length;j++){
      const f=j/pt.trail.length;
      const a=f*0.7*pt.bright; // Brighter trails
      ctx.beginPath();
      ctx.moveTo(pt.trail[j-1].x,pt.trail[j-1].y);
      ctx.lineTo(pt.trail[j].x,pt.trail[j].y);
      ctx.strokeStyle='rgba('+CR+','+CG+','+CB+','+a+')';
      ctx.lineWidth=pt.sz*f*2;ctx.lineCap='round';ctx.stroke();
    }
  }

  // Draw particles with intense glow
  for(let i=0;i<N;i++){
    const pt=pts[i];
    const a=pt.locked?1:pt.bright;
    const s=pt.locked?pt.sz*1.5:pt.sz; // Particles grow when locked

    // Wide outer glow
    ctx.beginPath();ctx.arc(pt.x,pt.y,s*6,0,Math.PI*2);
    ctx.fillStyle='rgba('+CR+','+CG+','+CB+','+(a*0.1)+')';ctx.fill();
    
    // Mid glow
    ctx.beginPath();ctx.arc(pt.x,pt.y,s*2.5,0,Math.PI*2);
    ctx.fillStyle='rgba('+CR+','+CG+','+CB+','+(a*0.3)+')';ctx.fill();
    
    // Core
    ctx.beginPath();ctx.arc(pt.x,pt.y,s,0,Math.PI*2);
    ctx.fillStyle='rgba('+CR+','+CG+','+CB+','+(a*0.9)+')';ctx.fill();
    
    // White hot center when executing
    if(pt.locked){
      ctx.beginPath();ctx.arc(pt.x,pt.y,s*0.4,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,'+a+')';ctx.fill();
    }
  }

  // Execution flash overlay
  if(executeFlash > 0.01){
    ctx.fillStyle='rgba(255,255,255,'+executeFlash+')';
    ctx.fillRect(0,0,W,H);
  }

  if(!RM)requestAnimationFrame(frame);
}
sz();requestAnimationFrame(frame);window.addEventListener('resize',sz);
</script>
</body>
</html>
